name: Pipeline Quotidien TEVIA & GREENO

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    name: ETL Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}" >> .env
          echo "MINIO_PORT=${{ secrets.MINIO_PORT }}" >> .env
          echo "MINIO_USE_SSL=${{ secrets.MINIO_USE_SSL }}" >> .env
          echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}" >> .env
          echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> .env
          echo "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}" >> .env
          echo "UPYA_USERNAME=${{ secrets.UPYA_USERNAME }}" >> .env
          echo "UPYA_PASSWORD=${{ secrets.UPYA_PASSWORD }}" >> .env
          echo "SURGE_DRIVE_FOLDER=${{ secrets.SURGE_DRIVE_FOLDER }}" >> .env
          echo "GOOGLE_CREDENTIALS_PATH=config/google_credentials.json" >> .env

      - name: Create Google credentials file
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/google_credentials.json

      - name: Debug .env
        run: cat .env

      - name: Bronze - Extraction contracts UPYA
        run: python bronze/upya/generic_extractor.py contracts

      - name: Bronze - Extraction payments UPYA
        run: python bronze/upya/generic_extractor.py payments

      - name: Bronze - Extraction assets UPYA
        run: python bronze/upya/generic_extractor.py assets

      - name: Silver - Chargement contracts UPYA
        run: python silver/upya/contracts_loader.py

      - name: Silver - Chargement payments UPYA
        run: python silver/upya/payments_loader.py

      - name: Silver - Chargement assets UPYA
        run: python silver/upya/generic_loader.py assets

      - name: Silver - Chargement tasks UPYA
        run: python silver/upya/tasks_loader.py

      - name: Silver - Chargement forms UPYA
        run: python silver/upya/forms_loader.py


      - name: Gold - Snapshot quotidien
        run: python gold/snapshot_builder.py

      - name: Statut pipeline
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Pipeline termine avec succes"
          else
            echo "Pipeline a echoue - verifier les logs"
          fi